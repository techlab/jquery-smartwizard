<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWizard Demo</title>
    <!-- <link rel="stylesheet" href="demo.css" /> -->

    <style>
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --border: #e5e7eb;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
        }

        body.dark {
            --bg: #111827;
            --panel: #1f2937;
            --border: #374151;
            --text: #f9fafb;
            --muted: #9ca3af;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .demo-header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }

        .demo-layout {
            display: flex;
            height: calc(100vh - 70px);
        }

        .demo-sidebar {
            width: 280px;
            padding: 1.5rem;
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .settings-group {
            margin-bottom: 2rem;
        }

        .settings-group h3 {
            margin-bottom: 1rem;
        }

        .settings-group label {
            display: block;
            font-size: 0.9rem;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
            color: var(--muted);
        }

        select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            color: var(--text);
        }

        .demo-preview {
            flex: 1;
            padding: 2rem;
            overflow: auto;
        }

        .preview-card {
            background: var(--panel);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .btn-ghost {
            background: none;
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .accordion-toggle {
            width: 100%;
            padding: 0.5rem;
            border: none;
            background: none;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
        }

        .accordion-content {
            display: none;
            margin-top: 1rem;
        }

        .accordion-content.active {
            display: block;
        }
    </style>
</head>

<body>

    <header class="demo-header">
        <div class="container">
            <h1>SmartWizard</h1>
            <button id="toggleDark" class="btn-ghost">🌙 Dark</button>
        </div>
    </header>

    <div class="demo-layout">

        <!-- SETTINGS SIDEBAR -->
        <aside class="demo-sidebar">

            <div class="settings-group">
                <h3>Basic Settings</h3>

                <label>Theme</label>
                <select id="themeSelect">
                    <option value="basic">Basic</option>
                    <option value="arrows">Arrows</option>
                    <option value="dots">Dots</option>
                    <option value="round">Round</option>
                </select>

                <label>Color</label>
                <select id="colorSelect">
                    <option value="default">Default</option>
                    <option value="ocean">Ocean</option>
                    <option value="forest">Forest</option>
                    <option value="crimson">Crimson</option>
                </select>

                <label>
                    <input type="checkbox" id="showToolbar" />
                    Show Toolbar
                </label>
            </div>

            <!-- ADVANCED SETTINGS -->
            <div class="settings-group">
                <button class="accordion-toggle">Advanced Settings</button>

                <div class="accordion-content">
                    <label>Animation</label>
                    <select id="animationSelect">
                        <option value="none">None</option>
                        <option value="fade">Fade</option>
                        <option value="slide-horizontal">Slide Horizontal</option>
                    </select>

                    <label>
                        <input type="checkbox" id="keyboardNav" checked />
                        Enable Keyboard Navigation
                    </label>

                    <label>
                        <input type="checkbox" id="autoAdjustHeight" checked />
                        Auto Adjust Height
                    </label>
                </div>
            </div>

        </aside>

        <!-- PREVIEW AREA -->
        <main class="demo-preview">

            <div class="preview-card">
                <div id="smartwizard">
                    <!-- Wizard content -->
                    <ul>
                        <li><a href="#step-1">Step 1</a></li>
                        <li><a href="#step-2">Step 2</a></li>
                        <li><a href="#step-3">Step 3</a></li>
                    </ul>

                    <div>
                        <div id="step-1">Step 1 Content</div>
                        <div id="step-2">Step 2 Content</div>
                        <div id="step-3">Step 3 Content</div>
                    </div>
                </div>
            </div>

        </main>

    </div>

    <!-- <script src="demo.js"></script> -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // Dark mode
            document.getElementById("toggleDark").addEventListener("click", () => {
                document.body.classList.toggle("dark");
            });

            // Accordion
            const toggle = document.querySelector(".accordion-toggle");
            const content = document.querySelector(".accordion-content");

            toggle.addEventListener("click", () => {
                content.classList.toggle("active");
            });

            // Example SmartWizard init
            function initWizard() {
                $('#smartwizard').smartWizard({
                    theme: document.getElementById("themeSelect").value,
                    transition: {
                        animation: document.getElementById("animationSelect").value
                    },
                    toolbar: {
                        showNextButton: true,
                        showPreviousButton: true,
                        position: document.getElementById("showToolbar").checked
                            ? 'bottom'
                            : 'none'
                    }
                });
            }

            // Reinitialize on change
            document.querySelectorAll("select, input").forEach(el => {
                el.addEventListener("change", () => {
                    $('#smartwizard').smartWizard("destroy");
                    initWizard();
                });
            });

            initWizard();
        });
    </script>
</body>

</html>
